<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Calculadora de Consumo de Energia</title>
  <link rel="stylesheet" href="css\estilo.css">
</head>
<body>

  <h1>Calculadora de Consumo de Energia</h1>

  <label for="watts">Potência (Watts):</label>
  <input id="watts" type="number">

  <label for="horas">Tempo de uso (horas):</label>
  <input id="horas" type="number">

  <button id="btnConsumo">Calcular Consumo Diário</button>
  <button id="botaomes">Calcular Consumo Mensal</button>

  <p id="resultado">Consumo (Wh): </p>
  <p id="resultadoKWH">Consumo (kWh): </p>

  <script src="js\script1.js"></script>
</body>
</html>
